<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Universal lockfile converter — npm, yarn, pnpm, bun converging to a canonical model">
  <defs>
    <!-- hexagon fill — canonical model / lock body -->
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>

    <!-- hexagon edge glow + shackle — single gradient spanning both shapes
         in userSpaceOnUse so the shackle picks up the same colour band
         where it adjoins the hex top. -->
    <linearGradient id="hexEdge" gradientUnits="userSpaceOnUse"
                    x1="150" y1="138" x2="250" y2="258">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- arrow markers — sized к читаться clearly на coloured paths -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9"
            orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10 L 2 5 Z" fill="context-stroke"/>
    </marker>
  </defs>

  <!-- bidirectional flow lines between PM nodes and centre.
       All 4 arrows: 10px gap к figure on each end, equal path length 58px.
       Box positions are pre-balanced (horizontal boxes shifted ±4 от 50/350
       к 46/354) so the vertical hex extent (vertices at y=±58) и the
       horizontal hex extent (vertices at x=±50) yield equal gaps. -->
  <g stroke-width="2.2" fill="none">
    <!-- npm (top): box bottom y=64; hex top y=142 -->
    <path d="M 200 74 L 200 132" stroke="#cb3837" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <!-- yarn (right): box left x=328; hex right x=250 -->
    <path d="M 318 200 L 260 200" stroke="#2c8ebb" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <!-- pnpm (bottom): box top y=336; hex bottom y=258 -->
    <path d="M 200 326 L 200 268" stroke="#f69220" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <!-- bun (left): box right x=72; hex left x=150 -->
    <path d="M 82 200 L 140 200" stroke="#d4a574" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  </g>

  <!-- PM nodes -->
  <!-- npm (top, red) -->
  <g transform="translate(200, 50)">
    <rect x="-26" y="-14" width="52" height="28" rx="4" fill="#cb3837"/>
    <text x="0" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">npm</text>
  </g>

  <!-- yarn (right, blue) — shifted +4 от 350 к 354 для equal arrow gap -->
  <g transform="translate(354, 200)">
    <rect x="-26" y="-14" width="52" height="28" rx="4" fill="#2c8ebb"/>
    <text x="0" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">yarn</text>
  </g>

  <!-- pnpm (bottom, orange) -->
  <g transform="translate(200, 350)">
    <rect x="-26" y="-14" width="52" height="28" rx="4" fill="#f69220"/>
    <text x="0" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">pnpm</text>
  </g>

  <!-- bun (left, cream/tan) — shifted -4 от 50 к 46 для equal arrow gap -->
  <g transform="translate(46, 200)">
    <rect x="-26" y="-14" width="52" height="28" rx="4" fill="#d4a574"/>
    <text x="0" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">bun</text>
  </g>

  <!-- central canonical hexagon — padlock motif: shackle on top edge -->
  <g transform="translate(200, 200)">
    <!-- padlock shackle. Stroke uses the SAME hexEdge gradient (userSpaceOnUse)
         as the hex outline; the shackle's bottom (which adjoins the hex top
         vertex) picks up the same cyan/purple band as the hex outline там. -->
    <path d="M -16 -50 L -16 -62 A 16 16 0 0 1 16 -62 L 16 -50"
          stroke="url(#hexEdge)" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- hexagon outline (the visible canonical / lock body border) -->
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29"
             fill="none" stroke="url(#hexEdge)" stroke-width="2.5" opacity="0.9"/>

    <!-- hexagon body (lock face) -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25"
             fill="url(#hexFill)" stroke="#475569" stroke-width="1"/>

    <!-- rooted dependency tree — lockfile's content metaphor.
         Gold root at top (highlighted = project / manifest root);
         two first-level deps; three transitive leaves. -->
    <g stroke="#a78bfa" stroke-width="1.2" fill="none" opacity="0.75">
      <!-- root → level-1 -->
      <line x1="0" y1="-22" x2="-14" y2="-4"/>
      <line x1="0" y1="-22" x2="14" y2="-4"/>
      <!-- level-1 → level-2 (transitives) -->
      <line x1="-14" y1="-4" x2="-20" y2="16"/>
      <line x1="-14" y1="-4" x2="-2" y2="16"/>
      <line x1="14" y1="-4" x2="20" y2="16"/>
    </g>
    <g fill="#1e293b" stroke="#a78bfa" stroke-width="0.8">
      <!-- level-1 nodes -->
      <circle cx="-14" cy="-4" r="3.2"/>
      <circle cx="14" cy="-4" r="3.2"/>
      <!-- level-2 leaves -->
      <circle cx="-20" cy="16" r="2.6"/>
      <circle cx="-2" cy="16" r="2.6"/>
      <circle cx="20" cy="16" r="2.6"/>
    </g>
    <!-- root node — emphasized -->
    <circle cx="0" cy="-22" r="4.2" fill="#fbbf24" stroke="#fde68a" stroke-width="0.6"/>
  </g>
</svg>
