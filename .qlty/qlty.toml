config_version = "0"

exclude_patterns = [
  "src/test/resources/fixtures/**",
]

# Underscore-prefixed modules are package-private plumbing: the format-family
# cores (formats/_*.ts) and shared test helpers. Their complexity is intrinsic
# and domain-bounded — decomposing them further would cross family boundaries,
# which we value above a metric number. Exempt them from STRUCTURAL SMELLS only
# (plugins = ["qlty"]); linters and security scanners still cover them.
[[ignore]]
plugins = ["qlty"]
file_patterns = ["**/_*.ts"]

# Thresholds tuned to this codebase's idioms (fail-closed returns, format-dispatch
# branching); file_complexity, duplication, boolean_logic, nesting keep defaults.
[smells.return_statements]
threshold = 10

[smells.function_parameters]
threshold = 8

[smells.function_complexity]
threshold = 30

[[source]]
name = "default"
default = true
