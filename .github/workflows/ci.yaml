name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  npm_config_audit: false
  npm_config_fund: false

permissions: {}

jobs:
  build:
    name: Build & test (Node 26)
    runs-on: ubuntu-latest
    timeout-minutes: 18   # backstop — a hung job can't burn more than this
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: 'npm'

      - run: npm ci

      - run: npm run test:types

      - run: npm run build:dist

      - run: npm run test:size

      # One instrumented run = the test gate + coverage (unit + integration +
      # infra). The split `test:unit` / `test:integration` scripts stay for fast
      # local iteration; CI runs them together under coverage. timeout caps a hang.
      - name: Tests + coverage
        timeout-minutes: 12
        run: npm run test:coverage

      # This phase runs untrusted deps + code (npm ci, the full suite), so it holds
      # NO secrets. It only *generates* the bundle and the coverage report and
      # caches them as artifacts; publishing them (npm + Qlty) happens downstream
      # in `release` — the only phase with secret access.
      - uses: actions/upload-artifact@v5
        with:
          name: build
          path: |
            dist
            package.json
          retention-days: 1

      - name: Cache coverage report for downstream publish
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: target/coverage
          retention-days: 7

  frozen-pnpm-6:
    name: Frozen oracle (Vitest Node 20, pnpm 6 Node 18)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Preserve Node 18 for the pnpm 6 subprocess
        run: echo "LOCKGRAPH_PNPM6_NODE=$(command -v node)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # pnpm 6's native registry path is calibrated on Node 18; newer legacy
      # candidates hit an upstream client incompatibility. Vitest 4 runs on its
      # Node 20 floor and delegates only the pnpm 6 subprocess to preserved Node 18.
      - run: npm run test:frozen:pnpm-6

  smoke:
    name: Smoke (Node ${{ matrix.node }})
    needs: build
    # Basic workability of the BUILT package on the support floor (14.18) and
    # current (26), against a prod-deps-only install — no typecheck / unit / lint
    # here, only that `lockgraph` loads and converts. Reuses the build artifact.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        node: ['14', '26']
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      # Node 14 ships npm 6, which cannot read lockfileVersion 3. Bump to a
      # v3-capable npm that still runs on Node 14.18.
      - if: matrix.node == '14'
        run: npm i -g npm@8

      - uses: actions/download-artifact@v5
        with:
          name: build

      - run: npm ci --omit=dev

      - run: npm run test:smoke

  release:
    name: Release ${{ github.ref }}
    needs: smoke
    # zx-semrel pre-wired (OIDC scheme + permissions) but kept inactive until the
    # publish gate opens. Flip to the live condition when 0.1.0 ships:
    #   if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks:    read
      statuses:  write
      contents:  write
      packages:  write
      id-token:  write   # OIDC to the npm registry — passwordless publish + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          # no `cache: npm` — release installs nothing (see below)

      - uses: actions/download-artifact@v5
        with:
          name: build

      - uses: actions/download-artifact@v5
        with:
          name: coverage
          path: target/coverage

      # NO `npm ci` here — release holds secrets (npm OIDC + the Qlty token), so it
      # must not install or run untrusted dependency code. It only publishes the
      # pre-built artifacts fetched above.
      - name: Publish coverage to Qlty
        uses: qltysh/qlty-action/coverage@v1
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: target/coverage/lcov.info

      - name: Release via zx-semrel (OIDC scheme)
        env:
          NPM_OIDC:           true
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_USER:            'x-access-token'
          GIT_BRANCH:         'master'
          GIT_AUTHOR_NAME:    ${{ vars.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL:   ${{ vars.GIT_AUTHOR_EMAIL }}
          GIT_COMMITTER_NAME: ${{ vars.GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ vars.GIT_COMMITTER_EMAIL }}
        run: npx zx-semrel
